{{- range $ns := .Values.namespaces }}
{{- if ne ($ns.enabled | default true | toString) "false" }}
{{- range $cr := $ns.clusterRoles | default list }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $cr.name }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
    platform.company-xxx.com/namespace: {{ $ns.namespace | quote }}
rules:
  {{- toYaml $cr.rules | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
