{{- range $ns := .Values.namespaces }}
{{- if ne ($ns.enabled | default true | toString) "false" }}
{{- $npEnabled := true }}
{{- if $ns.networkPolicy }}
{{- if eq ($ns.networkPolicy.enabled | default true | toString) "false" }}
{{- $npEnabled = false }}
{{- end }}
{{- end }}
{{- if $npEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-ingress
  namespace: {{ $ns.namespace | quote }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-monitoring
  namespace: {{ $ns.namespace | quote }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-same-namespace
  namespace: {{ $ns.namespace | quote }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  policyTypes:
    - Ingress
{{- if $ns.networkPolicy }}
{{- range $allowNs := $ns.networkPolicy.allowFromNamespaces | default list }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-{{ $allowNs | lower | replace "_" "-" | trunc 50 }}
  namespace: {{ $ns.namespace | quote }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $allowNs }}
  policyTypes:
    - Ingress
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
